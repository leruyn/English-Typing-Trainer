# Render Blueprint for the Active Recall English Typer API.
#
# Deploys the Express/Prisma server in `server/` (this is a monorepo, so
# `rootDir` scopes builds/commands to this subdirectory) alongside a managed
# Postgres database. Apply with `render blueprint launch` or by connecting
# the repo in the Render dashboard and pointing it at this file.
#
# After the first deploy, run the Prisma migration + seed once (e.g. via
# the Render shell or a one-off job):
#   npx prisma migrate deploy
#   npx prisma db seed
#
# Both resources are on the free plan (no card required to deploy this
# blueprint): the web service spins down after ~15 min of inactivity (cold
# start on the next request), and the free Postgres instance is deleted
# after 90 days unless upgraded. Bump both `plan:` values to `starter` for
# production-grade always-on behavior once ready to add a payment method.

databases:
  - name: art-db
    databaseName: art
    plan: free
    region: oregon

services:
  - type: web
    name: art-server
    env: node
    plan: free
    region: oregon
    rootDir: server
    # --include=dev is required: NODE_ENV=production (set below) makes plain
    # `npm install` skip devDependencies, but the build needs typescript,
    # @types/*, and prisma's CLI, which all live there.
    # packages/shared must be compiled to dist/ first (server imports the
    # compiled @art/shared, not its TypeScript source) before building server.
    # Using --prefix (not -w/--workspace) because buildCommand runs with cwd
    # already inside server/ (due to rootDir), where npm's workspace-target
    # flags don't resolve sibling workspaces - a plain relative path does.
    # Free-tier instances don't support the interactive Shell, one-off jobs,
    # OR preDeployCommand (all three are greyed out/locked on the free plan -
    # confirmed in the dashboard, where Pre-Deploy Command shows a lock icon
    # and silently never ran, leaving `public.users` missing at runtime).
    # So the schema push and the (idempotent, upsert-based) vocab seed are
    # tacked onto the end of buildCommand instead, which free instances DO
    # run on every deploy. No prisma/migrations/ directory exists yet (this
    # project hasn't adopted migration history), so `db push` is used
    # instead of `migrate deploy` - it syncs the DB schema straight from
    # schema.prisma. --accept-data-loss is safe here: the DB starts empty
    # and every later schema change is additive, not lossy.
    buildCommand: npm install --include=dev && npm --prefix ../packages/shared run build && npm run build && npx prisma db push --accept-data-loss --skip-generate && npm run prisma:seed
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: art-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      # Gemini API key for the AI features (/stats/coaching,
      # /assessment/question, /ai/explain - see server/src/lib/gemini.ts).
      # `sync: false` marks this as a secret Render won't try to fill in
      # from this file - paste the real key in the dashboard's Environment
      # tab after first deploy. Without it, those three routes 503 but
      # every other endpoint keeps working normally.
      - key: GEMINI_API_KEY
        sync: false
      # Optional override; defaults to gemini-3.5-flash if unset (see
      # DEFAULT_MODEL in gemini.ts).
      - key: GEMINI_MODEL
        sync: false
      # Optional per-route maxOutputTokens overrides (see getEnvInt in
      # gemini.ts) - tune response length without a code change/redeploy.
      # Defaults: explain=800, coaching=500, assessment=500.
      - key: GEMINI_EXPLAIN_MAX_TOKENS
        sync: false
      - key: GEMINI_COACHING_MAX_TOKENS
        sync: false
      - key: GEMINI_ASSESSMENT_MAX_TOKENS
        sync: false
